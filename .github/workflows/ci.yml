# Runs on every push and pull request to main/master.
# Render deploy is separate — this only validates code before/after you merge.

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  client-build:
    name: Client build (TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: client/package.json

      - name: Install dependencies
        run: npm install

      - name: Production build
        run: npm run build

  e2e:
    name: E2E tests (Playwright)
    runs-on: ubuntu-latest
    needs: client-build

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: client/package.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install Python dependencies
        run: |
          pip install pipenv
          pipenv install --deploy

      - name: Run database migrations
        env:
          SECRET_KEY: ci-test-secret
          FLASK_APP: server.app
        run: pipenv run flask db upgrade

      - name: Install client dependencies
        working-directory: client
        run: npm install

      - name: Install Playwright browser
        working-directory: client
        run: npx playwright install --with-deps chromium

      - name: Start backend
        env:
          SECRET_KEY: ci-test-secret
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pipenv run python server/app.py &
          timeout 120 bash -c 'until curl -sf http://127.0.0.1:5555/api/topics; do sleep 2; done'

      - name: Start frontend
        working-directory: client
        env:
          CI: true
        run: |
          npm start &
          timeout 120 bash -c 'until curl -sf http://127.0.0.1:3000; do sleep 2; done'

      - name: Run Playwright tests
        working-directory: client
        env:
          CI: true
        run: npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: client/playwright-report/
          retention-days: 7
